<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1130" width="800" height="1130" font-family="system-ui, -apple-system, Inter, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="55%" style="stop-color:#1a1640"/>
      <stop offset="100%" style="stop-color:#0f1117"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="800" height="1130" fill="url(#bgGrad)"/>

  <!-- Glow décoratif -->
  <ellipse cx="600" cy="200" rx="250" ry="200" fill="rgba(99,102,241,0.12)" filter="url(#softglow)"/>
  <ellipse cx="150" cy="900" rx="200" ry="160" fill="rgba(99,102,241,0.08)" filter="url(#softglow)"/>

  <!-- Grille décorative (points) -->
  <g fill="rgba(255,255,255,0.04)">
    <circle cx="50" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="250" cy="50" r="2"/>
    <circle cx="550" cy="50" r="2"/><circle cx="650" cy="50" r="2"/><circle cx="750" cy="50" r="2"/>
    <circle cx="50" cy="150" r="2"/><circle cx="750" cy="150" r="2"/>
    <circle cx="50" cy="1000" r="2"/><circle cx="150" cy="1000" r="2"/>
    <circle cx="650" cy="1000" r="2"/><circle cx="750" cy="1000" r="2"/>
  </g>

  <!-- Barre accent top -->
  <rect x="0" y="0" width="800" height="5" fill="url(#indigoGrad)"/>

  <!-- ── HEADER ── -->
  <!-- Badge -->
  <rect x="280" y="38" width="240" height="26" rx="13" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="400" y="55" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600" letter-spacing="2">GROUPE 06 · MAKERSPACE AMIENS</text>

  <!-- Logo carré -->
  <rect x="354" y="82" width="44" height="44" rx="12" fill="url(#indigoGrad)" filter="url(#glow)"/>
  <text x="376" y="110" text-anchor="middle" fill="white" font-size="22" font-weight="800">M</text>

  <!-- Titre principal -->
  <text x="400" y="172" text-anchor="middle" font-size="54" font-weight="800" letter-spacing="-2" fill="url(#titleGrad)">Machine</text>
  <text x="400" y="230" text-anchor="middle" font-size="54" font-weight="800" letter-spacing="-2" fill="url(#titleGrad)">That Draw</text>

  <!-- Sous-titre -->
  <text x="400" y="268" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">Machine dessinatrice à commande numérique</text>

  <!-- Ligne séparatrice -->
  <line x1="60" y1="292" x2="740" y2="292" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ── DESCRIPTION ── -->
  <text x="400" y="328" text-anchor="middle" font-size="13.5" fill="rgba(255,255,255,0.6)" line-spacing="6">
    <tspan x="400" dy="0">Notre machine est capable de reproduire automatiquement un dessin</tspan>
    <tspan x="400" dy="22">vectoriel sur une surface plane, en utilisant deux axes de déplacement</tspan>
    <tspan x="400" dy="22">et un servo-moteur pour contrôler le stylo.</tspan>
  </text>

  <!-- ── STATS ── -->
  <g transform="translate(60, 400)">
    <!-- Carte 1 -->
    <rect width="152" height="90" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="76" y="40" text-anchor="middle" font-size="32" font-weight="800" fill="#6366f1">2</text>
    <text x="76" y="62" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)">Axes de déplacement</text>
    <text x="76" y="78" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.25)">(X et Y)</text>
    <!-- Carte 2 -->
    <rect x="172" width="152" height="90" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="248" y="40" text-anchor="middle" font-size="32" font-weight="800" fill="#6366f1">1</text>
    <text x="248" y="62" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)">Servo-moteur</text>
    <text x="248" y="78" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.25)">(contrôle du stylo)</text>
    <!-- Carte 3 -->
    <rect x="344" width="152" height="90" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="420" y="40" text-anchor="middle" font-size="32" font-weight="800" fill="#6366f1">4</text>
    <text x="420" y="62" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)">Membres</text>
    <text x="420" y="78" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.25)">(équipe pluridisciplinaire)</text>
    <!-- Carte 4 -->
    <rect x="516" width="164" height="90" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="598" y="40" text-anchor="middle" font-size="26" font-weight="800" fill="#6366f1">100%</text>
    <text x="598" y="62" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)">Conçu et fabriqué</text>
    <text x="598" y="78" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.25)">(par notre équipe)</text>
  </g>

  <!-- ── DOMAINES ── -->
  <line x1="60" y1="516" x2="740" y2="516" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="400" y="548" text-anchor="middle" font-size="11" font-weight="700" fill="rgba(255,255,255,0.25)" letter-spacing="3">DOMAINES D'EXPERTISE</text>

  <g transform="translate(60, 568)">
    <!-- Mécanique -->
    <rect width="210" height="160" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="16" y="16" width="36" height="36" rx="10" fill="rgba(99,102,241,0.2)"/>
    <text x="34" y="40" text-anchor="middle" font-size="20">⚙️</text>
    <text x="16" y="78" font-size="14" font-weight="700" fill="white">Mécanique</text>
    <text x="16" y="100" font-size="11" fill="rgba(255,255,255,0.45)">Structure deux axes X/Y,</text>
    <text x="16" y="116" font-size="11" fill="rgba(255,255,255,0.45)">guidages linéaires,</text>
    <text x="16" y="132" font-size="11" fill="rgba(255,255,255,0.45)">courroies et châssis.</text>

    <!-- Électronique -->
    <rect x="230" width="210" height="160" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="246" y="16" width="36" height="36" rx="10" fill="rgba(99,102,241,0.2)"/>
    <text x="264" y="40" text-anchor="middle" font-size="20">⚡</text>
    <text x="246" y="78" font-size="14" font-weight="700" fill="white">Électronique</text>
    <text x="246" y="100" font-size="11" fill="rgba(255,255,255,0.45)">Arduino, drivers moteurs</text>
    <text x="246" y="116" font-size="11" fill="rgba(255,255,255,0.45)">pas-à-pas, alimentation</text>
    <text x="246" y="132" font-size="11" fill="rgba(255,255,255,0.45)">et câblage régulé.</text>

    <!-- Logiciel -->
    <rect x="460" width="210" height="160" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="476" y="16" width="36" height="36" rx="10" fill="rgba(99,102,241,0.2)"/>
    <text x="494" y="40" text-anchor="middle" font-size="20">💻</text>
    <text x="476" y="78" font-size="14" font-weight="700" fill="white">Logiciel</text>
    <text x="476" y="100" font-size="11" fill="rgba(255,255,255,0.45)">Conversion SVG → G-code,</text>
    <text x="476" y="116" font-size="11" fill="rgba(255,255,255,0.45)">firmware Arduino,</text>
    <text x="476" y="132" font-size="11" fill="rgba(255,255,255,0.45)">interface de contrôle.</text>
  </g>

  <!-- ── MISSION ── -->
  <rect x="60" y="760" width="680" height="80" rx="14" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <rect x="60" y="760" width="5" height="80" rx="3" fill="url(#indigoGrad)"/>
  <text x="90" y="793" font-size="11" font-weight="700" fill="#a5b4fc" letter-spacing="1">MISSION</text>
  <text x="90" y="816" font-size="12.5" fill="rgba(255,255,255,0.65)">Transformer un fichier numérique en tracé physique grâce à une architecture</text>
  <text x="90" y="832" font-size="12.5" fill="rgba(255,255,255,0.65)">mécanique, électronique et logicielle conçue entièrement par notre équipe.</text>

  <!-- ── ÉQUIPE ── -->
  <line x1="60" y1="872" x2="740" y2="872" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="400" y="900" text-anchor="middle" font-size="11" font-weight="700" fill="rgba(255,255,255,0.25)" letter-spacing="3">NOTRE ÉQUIPE</text>

  <g transform="translate(60, 920)">
    <!-- Membre 1 -->
    <circle cx="80" cy="34" r="28" fill="url(#indigoGrad)" opacity="0.9"/>
    <text x="80" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="white">AV</text>
    <text x="80" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.8)">Avsin ATAC</text>
    <text x="80" y="93" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)">Site · Rapport · Vidéo</text>

    <!-- Membre 2 -->
    <circle cx="253" cy="34" r="28" fill="url(#indigoGrad)" opacity="0.9"/>
    <text x="253" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="white">PI</text>
    <text x="253" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.8)">Pierre VILLAIN</text>
    <text x="253" y="93" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)">Électronique</text>

    <!-- Membre 3 -->
    <circle cx="427" cy="34" r="28" fill="url(#indigoGrad)" opacity="0.9"/>
    <text x="427" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="white">DJ</text>
    <text x="427" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.8)">Djhaer MADIALI</text>
    <text x="427" y="93" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)">Programmation</text>

    <!-- Membre 4 -->
    <circle cx="600" cy="34" r="28" fill="url(#indigoGrad)" opacity="0.9"/>
    <text x="600" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="white">EM</text>
    <text x="600" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.8)">Emilien VITRY-LHOTTE</text>
    <text x="600" y="93" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)">Fabrication</text>
  </g>

  <!-- ── FOOTER ── -->
  <line x1="60" y1="1068" x2="740" y2="1068" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="400" y="1093" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.2)">Makerspace Amiens · 2025-2026 · IUT Amiens</text>
  <rect x="0" y="1125" width="800" height="5" fill="url(#indigoGrad)"/>
</svg>
