name: CI
on:
  push:
    branches: ["main"]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check site folder exists
        run: |
          if [ ! -f "site/index.html" ]; then
            echo "ERROR: site/index.html not found"
            exit 1
          fi
          echo "site/index.html found ✓"
